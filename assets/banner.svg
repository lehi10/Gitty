<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>

    <!-- Brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>

    <!-- Dots pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.3"/>
  <rect width="1200" height="300" fill="url(#dots)" opacity="0.2"/>

  <!-- Decorative branch visualization (left side) -->
  <g transform="translate(80, 80)" opacity="0.4">
    <line x1="0" y1="0" x2="0" y2="140" stroke="#10B981" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#10B981"/>
    <circle cx="0" cy="35" r="4" fill="#10B981"/>
    <circle cx="0" cy="70" r="4" fill="#10B981"/>
    <circle cx="0" cy="105" r="4" fill="#10B981"/>
    <circle cx="0" cy="140" r="5" fill="#34D399"/>

    <path d="M 0 35 Q 15 35, 25 25" stroke="#10B981" stroke-width="2" fill="none"/>
    <line x1="25" y1="25" x2="50" y2="25" stroke="#10B981" stroke-width="2"/>
    <circle cx="50" cy="25" r="4" fill="#10B981"/>

    <path d="M 0 70 Q 20 70, 30 55" stroke="#34D399" stroke-width="2" fill="none"/>
    <line x1="30" y1="55" x2="60" y2="55" stroke="#34D399" stroke-width="2"/>
    <circle cx="60" cy="55" r="4" fill="#34D399"/>
  </g>

  <!-- Main content centered -->
  <g transform="translate(400, 85)">
    <!-- Logo icon -->
    <g filter="url(#glow)">
      <path d="M 50 15 A 35 35 0 1 0 50 70 L 50 42.5 L 35 42.5"
            stroke="url(#brandGrad)"
            stroke-width="9"
            stroke-linecap="round"
            fill="none"/>
      <circle cx="72" cy="42.5" r="8" fill="#10B981"/>
      <line x1="50" y1="42.5" x2="72" y2="42.5" stroke="url(#brandGrad)" stroke-width="6"/>
    </g>

    <!-- gitty text -->
    <text x="125" y="68"
          font-family="'Inter', system-ui, -apple-system, sans-serif"
          font-size="70"
          font-weight="800"
          fill="#F8FAFC"
          letter-spacing="-2">
      gitty
    </text>
  </g>

  <!-- Tagline -->
  <text x="600" y="200"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-size="20"
        font-weight="400"
        fill="#94A3B8"
        letter-spacing="0.5">
    Interactive Git branch management
  </text>

  <!-- Feature badges -->
  <g transform="translate(450, 225)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#10B981">checkout</text>

    <rect x="95" y="0" width="50" height="28" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="120" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#34D399">init</text>

    <rect x="160" y="0" width="40" height="28" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="180" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#6EE7B7">pr</text>

    <rect x="215" y="0" width="60" height="28" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="245" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#A7F3D0">status</text>
  </g>

  <!-- Decorative elements (right side) -->
  <g transform="translate(1050, 80)" opacity="0.3">
    <circle cx="20" cy="20" r="3" fill="#10B981"/>
    <circle cx="45" cy="35" r="2" fill="#34D399"/>
    <circle cx="30" cy="60" r="4" fill="#10B981"/>
    <circle cx="55" cy="80" r="2.5" fill="#34D399"/>
    <circle cx="15" cy="100" r="3" fill="#6EE7B7"/>
    <circle cx="40" cy="120" r="2" fill="#10B981"/>
  </g>

  <!-- Terminal-style accent -->
  <g transform="translate(200, 40)" opacity="0.5">
    <rect width="8" height="8" fill="#10B981"/>
    <rect x="12" width="8" height="8" fill="#34D399"/>
    <rect x="24" width="8" height="8" fill="#6EE7B7"/>
  </g>
</svg>
